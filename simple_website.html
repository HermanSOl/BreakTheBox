<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #eef2f7;
        color: #2c3e50;
      }
      .page-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 16px;
      }
      .login-card {
        width: 100%;
        max-width: 420px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
        padding: 32px;
      }
      .login-card h1 {
        margin-top: 0;
        margin-bottom: 16px;
        font-size: 1.9rem;
        letter-spacing: 0.02em;
      }
      .login-card label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .login-card input {
        width: 100%;
        padding: 12px 14px;
        margin-bottom: 18px;
        border: 1px solid #d1d9e6;
        border-radius: 10px;
        font-size: 1rem;
      }
      .login-card input:focus {
        border-color: #4a90e2;
        outline: none;
        box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.12);
      }
      .button {
        width: 100%;
        background: #0077cc;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 10px;
        font-size: 1rem;
        cursor: pointer;
      }
      .button:hover {
        background: #005fa3;
      }
      .secondary-text {
        margin-top: 20px;
        text-align: center;
        color: #7d8b9d;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <article class="login-card">
        <h1>Login</h1>
        <form action="#" method="post">
          <div>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required />
          </div>
          <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />
          </div>
          <button class="button" type="submit">Sign In</button>
        </form>
        <p class="secondary-text">Need an account? Contact the administrator.</p>
      </article>
    </div>
  </body>
</html>
